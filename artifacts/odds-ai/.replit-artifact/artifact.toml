kind = "web"
previewPath = "/"
title = "Odds AI"
version = "1.0.0"
id = "artifacts/odds-ai"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24296

[services.development]
run = "pnpm --filter @workspace/odds-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/odds-ai", "run", "build" ]
serve = "static"
publicDir = "artifacts/odds-ai/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24296"
BASE_PATH = "/"
